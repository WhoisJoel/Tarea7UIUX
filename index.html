<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea7</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="login-container">
        
        <section class="login-panel">
            
            <div class="logo-container">
                <img src="assets/Vector.svg" alt="Jala University Logo" class="logo">
            </div>

            <div class="login-content">
                <div class="welcome-text">
                    <h1>Nice to see you again</h1>
                    <p>Log in to continue your learning journey</p>
                </div>

                <form class="login-form">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="••••••••" required>
                            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-actions">
                        <label class="remember-me">
                            <input type="checkbox" id="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-primary">Sign in</button>
                </form>

                <p class="signup-prompt">
                    Don't have an account? <a href="#">Create account</a>
                </p>
            </div>
        </section>

        <section class="image-panel">
            <div class="testimonial-card">
                <p class="testimonial-text">"Jala University gave me the skills and the community to land my first software engineering role — 100% online, at my own pace."</p>
                <div class="testimonial-author">
                    <div class="avatar">JP</div>
                    <div class="author-info">
                        <strong>Juan Perez</strong>
                        <span>Software Engineer - Class of 2026</span>
                    </div>
                </div>
            </div>
        </section>
        
    </main>
</body>
</html>
